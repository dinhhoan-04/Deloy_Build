name: Deploy Landing to S3 and CloudFront

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "research-kit/landing/**"
      - ".github/workflows/deploy-landing.yml"

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  LANDING_BUCKET_NAME: ${{ vars.LANDING_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy-landing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync landing site to S3
        run: |
          aws s3 sync \
            research-kit/landing/ \
            "s3://$LANDING_BUCKET_NAME/" \
            --delete \
            --region "$AWS_REGION"

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Deployment summary
        run: |
          {
            echo "## Landing deploy complete"
            echo
            echo "- S3 bucket: \`$LANDING_BUCKET_NAME\`"
            if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
              echo "- CloudFront distribution: \`$CLOUDFRONT_DISTRIBUTION_ID\`"
            else
              echo "- CloudFront distribution: not used in test mode"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
