name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - "research-kit/backend/**"
      - "research-kit/shared/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "research-kit/backend/**"
      - "research-kit/shared/**"
      - ".github/workflows/ci-backend.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: research-kit/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.5

      - name: Ruff check (lint)
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: research-kit/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -e ../shared

      - name: Run pytest
        run: |
          pytest --tb=short -q \
            --ignore=tests/collect \
            --ignore=tests/contract \
            --ignore=tests/tier1 \
            --ignore=tests/tier2 \
            --ignore=tests/tier3 \
            --ignore=tests/unit \
            --ignore=tests/test_api.py \
            --ignore=tests/test_provider_field.py \
            --ignore=tests/test_verify_service.py \
            --ignore=tests/test_runs_cancel.py \
            --ignore=tests/test_runs_post.py \
            --ignore=tests/test_sessions.py \
            --ignore=tests/test_sse_replay_no_dup.py \
            --ignore=tests/test_conflict_confirm.py \
            --ignore=tests/test_draft_repo.py \
            -k "not test_migrations"
