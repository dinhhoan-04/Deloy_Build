name: Bootstrap AWS Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  TF_IN_AUTOMATION: "true"
  TF_STATE_BUCKET: research-kit-tfstate-087195661500

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: research-kit/infra/aws/terraform

    env:
      TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'research-kit' }}
      TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
      TF_VAR_region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS || 'db.t4g.micro' }}
      TF_VAR_db_backup_retention_period: ${{ vars.DB_BACKUP_RETENTION_PERIOD || '0' }}
      TF_VAR_ecs_task_cpu: ${{ vars.ECS_TASK_CPU || '512' }}
      TF_VAR_ecs_task_memory: ${{ vars.ECS_TASK_MEMORY || '1024' }}
      TF_VAR_ecs_desired_count: ${{ vars.ECS_DESIRED_COUNT || '1' }}
      TF_VAR_redis_node_type: ${{ vars.REDIS_NODE_TYPE || 'cache.t4g.micro' }}
      TF_VAR_create_elasticache: ${{ vars.CREATE_ELASTICACHE || 'false' }}
      TF_VAR_create_cloudfront: ${{ vars.CREATE_CLOUDFRONT || 'false' }}
      TF_VAR_external_redis_url: ${{ secrets.EXTERNAL_REDIS_URL }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_google_api_key: ${{ secrets.GOOGLE_API_KEY }}
      TF_VAR_zai_api_key: ${{ secrets.ZAI_API_KEY }}
      TF_VAR_session_secret: ${{ secrets.SESSION_SECRET }}
      TF_VAR_rk_mcp_token: ${{ secrets.RK_MCP_TOKEN }}
      TF_VAR_llm_primary_provider: ${{ vars.LLM_PRIMARY_PROVIDER || 'openai' }}
      TF_VAR_llm_gemini_model: ${{ vars.LLM_GEMINI_MODEL || 'gemini-2.5-flash' }}
      TF_VAR_llm_zai_model: ${{ vars.LLM_ZAI_MODEL || 'glm-4.7' }}
      TF_VAR_llm_openai_model: ${{ vars.LLM_OPENAI_MODEL || 'gpt-4o-mini' }}
      TF_VAR_log_level: ${{ vars.LOG_LEVEL || 'INFO' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create Terraform state bucket
        run: |
          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Creating state bucket: $TF_STATE_BUCKET"
            aws s3api create-bucket \
              --bucket "$TF_STATE_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket "$TF_STATE_BUCKET" \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          else
            echo "State bucket already exists."
          fi

      - name: Cleanup old resources
        run: |
          set +e
          PREFIX="research-kit"
          echo "========================================="
          echo "  CLEANING UP OLD AWS RESOURCES"
          echo "========================================="

          # --- 1. Delete ECS Services & Cluster ---
          echo "--- Deleting ECS resources ---"
          CLUSTER="${PREFIX}-backend"
          SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns" --output text 2>/dev/null)
          if [ -n "$SERVICES" ] && [ "$SERVICES" != "None" ]; then
            for SVC in $SERVICES; do
              echo "  Stopping ECS service: $SVC"
              aws ecs update-service --cluster "$CLUSTER" --service "$SVC" --desired-count 0 2>/dev/null
              aws ecs delete-service --cluster "$CLUSTER" --service "$SVC" --force 2>/dev/null
            done
            echo "  Waiting for services to drain (30s)..."
            sleep 30
          fi
          aws ecs delete-cluster --cluster "$CLUSTER" 2>/dev/null && echo "  Deleted ECS cluster" || true

          # --- 2. Delete ALB Listeners ---
          echo "--- Deleting ALB resources ---"
          ALB_ARN=$(aws elbv2 describe-load-balancers --names "${PREFIX}-api" --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null) || true
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            LISTENER_ARNS=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[*].ListenerArn" --output text 2>/dev/null) || true
            for LARN in $LISTENER_ARNS; do
              echo "  Deleting listener: $LARN"
              aws elbv2 delete-listener --listener-arn "$LARN" 2>/dev/null || true
            done
            echo "  Deleting ALB: $ALB_ARN"
            aws elbv2 delete-load-balancer --load-balancer-arn "$ALB_ARN" 2>/dev/null || true
          fi

          # Delete target groups
          TG_ARNS=$(aws elbv2 describe-target-groups --names "${PREFIX}-api" --query "TargetGroups[*].TargetGroupArn" --output text 2>/dev/null) || true
          for TG in $TG_ARNS; do
            echo "  Deleting target group: $TG"
            aws elbv2 delete-target-group --target-group-arn "$TG" 2>/dev/null || true
          done

          # --- 3. Delete RDS ---
          echo "--- Deleting RDS instance (this takes a while) ---"
          aws rds delete-db-instance \
            --db-instance-identifier "${PREFIX}-postgres" \
            --skip-final-snapshot \
            --delete-automated-backups 2>/dev/null && echo "  RDS deletion started..." || echo "  RDS not found or already deleting"

          # --- 4. Delete Secrets Manager ---
          echo "--- Deleting Secrets Manager secrets ---"
          for SECRET_KEY in database-url redis-url session-secret google-client-id gemini-api-key openai-api-key google-api-key zai-api-key rk-mcp-token; do
            aws secretsmanager delete-secret \
              --secret-id "/${PREFIX}/${SECRET_KEY}" \
              --force-delete-without-recovery 2>/dev/null && echo "  Deleted secret: ${SECRET_KEY}" || true
          done

          # --- 5. Delete CloudWatch Log Group ---
          echo "--- Deleting CloudWatch log group ---"
          aws logs delete-log-group --log-group-name "/ecs/${PREFIX}-backend" 2>/dev/null && echo "  Deleted log group" || true

          # --- 6. Delete ECR Repository ---
          echo "--- Deleting ECR repository ---"
          aws ecr delete-repository --repository-name "${PREFIX}-backend" --force 2>/dev/null && echo "  Deleted ECR repo" || true

          # --- 7. Delete IAM Roles ---
          echo "--- Deleting IAM roles ---"
          for ROLE in "${PREFIX}-ecs-exec" "${PREFIX}-ecs-task"; do
            # Detach managed policies
            POLICIES=$(aws iam list-attached-role-policies --role-name "$ROLE" --query "AttachedPolicies[*].PolicyArn" --output text 2>/dev/null) || true
            for POL in $POLICIES; do
              aws iam detach-role-policy --role-name "$ROLE" --policy-arn "$POL" 2>/dev/null || true
            done
            # Delete inline policies
            INLINE=$(aws iam list-role-policies --role-name "$ROLE" --query "PolicyNames" --output text 2>/dev/null) || true
            for IPOL in $INLINE; do
              aws iam delete-role-policy --role-name "$ROLE" --policy-name "$IPOL" 2>/dev/null || true
            done
            aws iam delete-role --role-name "$ROLE" 2>/dev/null && echo "  Deleted IAM role: $ROLE" || true
          done

          # --- 8. Delete S3 Bucket ---
          echo "--- Deleting S3 landing bucket ---"
          S3_BUCKET=$(aws s3api list-buckets --query "Buckets[?starts_with(Name,'${PREFIX}-landing-')].Name | [0]" --output text 2>/dev/null) || true
          if [ -n "$S3_BUCKET" ] && [ "$S3_BUCKET" != "None" ]; then
            aws s3 rm "s3://${S3_BUCKET}" --recursive 2>/dev/null || true
            aws s3api delete-bucket --bucket "$S3_BUCKET" 2>/dev/null && echo "  Deleted S3 bucket: $S3_BUCKET" || true
          fi

          # --- 9. Wait for RDS deletion ---
          echo "--- Waiting for RDS deletion (up to 15 min) ---"
          aws rds wait db-instance-deleted --db-instance-identifier "${PREFIX}-postgres" 2>/dev/null && echo "  RDS instance deleted" || echo "  RDS wait complete (may not have existed)"

          # --- 10. Delete DB Subnet Group ---
          echo "--- Deleting DB subnet group ---"
          aws rds delete-db-subnet-group --db-subnet-group-name "${PREFIX}-postgres" 2>/dev/null && echo "  Deleted DB subnet group" || true

          # --- 11. Delete VPC and networking ---
          echo "--- Deleting VPC and networking ---"
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=${PREFIX}-vpc" --query "Vpcs[0].VpcId" --output text 2>/dev/null) || true
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "  Found VPC: $VPC_ID"

            # Delete all ENIs (network interfaces) in the VPC
            ENI_IDS=$(aws ec2 describe-network-interfaces --filters "Name=vpc-id,Values=$VPC_ID" --query "NetworkInterfaces[*].NetworkInterfaceId" --output text 2>/dev/null) || true
            for ENI in $ENI_IDS; do
              # Detach first
              ATTACH_ID=$(aws ec2 describe-network-interfaces --network-interface-ids "$ENI" --query "NetworkInterfaces[0].Attachment.AttachmentId" --output text 2>/dev/null) || true
              if [ -n "$ATTACH_ID" ] && [ "$ATTACH_ID" != "None" ]; then
                aws ec2 detach-network-interface --attachment-id "$ATTACH_ID" --force 2>/dev/null || true
                sleep 2
              fi
              aws ec2 delete-network-interface --network-interface-id "$ENI" 2>/dev/null || true
            done

            # Delete security groups (not default)
            SG_IDS=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" --query "SecurityGroups[?GroupName!='default'].GroupId" --output text 2>/dev/null) || true
            for SG in $SG_IDS; do
              echo "  Deleting security group: $SG"
              aws ec2 delete-security-group --group-id "$SG" 2>/dev/null || true
            done

            # Delete subnets
            SUBNET_IDS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query "Subnets[*].SubnetId" --output text 2>/dev/null) || true
            for SUB in $SUBNET_IDS; do
              echo "  Deleting subnet: $SUB"
              aws ec2 delete-subnet --subnet-id "$SUB" 2>/dev/null || true
            done

            # Delete route tables (not main)
            RT_IDS=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" --query "RouteTables[?Associations[0].Main!=\`true\`].RouteTableId" --output text 2>/dev/null) || true
            for RT in $RT_IDS; do
              # Delete associations first
              ASSOC_IDS=$(aws ec2 describe-route-tables --route-table-ids "$RT" --query "RouteTables[0].Associations[?!Main].RouteTableAssociationId" --output text 2>/dev/null) || true
              for ASSOC in $ASSOC_IDS; do
                aws ec2 disassociate-route-table --association-id "$ASSOC" 2>/dev/null || true
              done
              echo "  Deleting route table: $RT"
              aws ec2 delete-route-table --route-table-id "$RT" 2>/dev/null || true
            done

            # Delete internet gateway
            IGW_ID=$(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$VPC_ID" --query "InternetGateways[0].InternetGatewayId" --output text 2>/dev/null) || true
            if [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ]; then
              echo "  Detaching and deleting IGW: $IGW_ID"
              aws ec2 detach-internet-gateway --internet-gateway-id "$IGW_ID" --vpc-id "$VPC_ID" 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id "$IGW_ID" 2>/dev/null || true
            fi

            # Delete VPC
            echo "  Deleting VPC: $VPC_ID"
            aws ec2 delete-vpc --vpc-id "$VPC_ID" 2>/dev/null && echo "  VPC deleted!" || echo "  VPC deletion failed (may have remaining dependencies)"
          fi

          # --- 12. Clear Terraform state ---
          echo "--- Clearing Terraform state ---"
          aws s3 rm "s3://${TF_STATE_BUCKET}/research-kit/terraform.tfstate" 2>/dev/null || true

          echo ""
          echo "========================================="
          echo "  CLEANUP COMPLETE"
          echo "========================================="

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="region=$AWS_REGION"

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Collect Terraform outputs
        run: terraform output -json > tf-outputs.json

      - name: Upload Terraform outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: research-kit/infra/aws/terraform/tf-outputs.json

      - name: Print setup summary
        run: |
          {
            echo "## AWS bootstrap complete"
            echo
            echo "Next:"
            echo "1. Open the \`terraform-outputs\` artifact from this run."
            echo "2. Copy the \`github_actions_repository_variables\` map into GitHub Repository Variables."
            echo "3. Make sure \`AWS_ACCESS_KEY_ID\` and \`AWS_SECRET_ACCESS_KEY\` exist in GitHub Secrets."
            echo "4. Run the \`Deploy Backend to ECS\` workflow."
            echo "5. Run the \`Deploy Landing to S3 and CloudFront\` workflow."
            echo "6. Run the \`Build Chrome Extension\` workflow."
            echo
            echo "If \`DOMAIN_NAME\` was empty, the outputs already contain AWS-generated fallback URLs:"
            echo "- \`API_BASE_URL\` from the ALB DNS name"
            echo "- \`LANDING_BASE_URL\` from the CloudFront domain"
          } >> "$GITHUB_STEP_SUMMARY"
